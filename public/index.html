<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="description" content="SHOWCTRL — Plataforma de gestión de riesgo para eventos masivos" />
    <title>SHOWCTRL — Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { mono: ['ui-monospace','SFMono-Regular','Menlo','Monaco','Consolas','monospace'] }
          }
        }
      }
    </script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0A0A0A; font-family: ui-monospace, monospace; }
      #root { min-height: 100vh; }
      input[type=range]::-webkit-slider-thumb { background: #FF5A00; }
      input[type=range]::-moz-range-thumb { background: #FF5A00; border: none; }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: #111; }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: #FF5A00; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
